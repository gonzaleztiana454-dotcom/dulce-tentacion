<!DOCTYPE html>
<html>
<head>
    <title>Login - Dulce Tentación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-image: url('/imagenes/fondo-postres.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .overlay{
            background: rgba(255,255,255,0.85);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-login {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background-color: white;
        }

        .titulo {
            color: #F48FB1;
            font-weight: bold;
        }

        .form-control {
            border-radius: 12px;
        }

        .btn-pastel {
            background-color: #F48FB1;
            color: white;
            border-radius: 12px;
        }

        .btn-pastel:hover {
            background-color: #ec6fa5;
            color: white;
        }

        .link-rosa {
            color: #F48FB1;
            text-decoration: none;
        }

        .link-rosa:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="overlay">

        <div class="card-login text-center">

            <h2 class="titulo mb-4">🍰 Dulce Tentación</h2>
            <p class="text-muted mb-4">Iniciá sesión para continuar</p>

            <form action="/login" method="POST">

                <div class="mb-3 text-start">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-4 text-start">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-pastel w-100 mb-3">
                    Iniciar sesión
                </button>

            </form>

            <p class="small">
                ¿No tenés cuenta? 
                <a href="index.html" class="link-rosa">Registrate aquí</a>
            </p>

        </div>    
    </div>

</body>
</html>
