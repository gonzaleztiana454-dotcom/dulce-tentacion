<!DOCTYPE html>
<html>
<head>
    <title>Compra Exitosa - Dulce Tentación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#fff0f5,#ffe4e1,#fffaf0);
            font-family: 'Segoe UI', sans-serif;
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .card{
            border-radius:25px;
            background:white;
            animation: aparecer 0.6s ease;
        }


        @keyframes aparecer{
            from{
                transform:translateY(20px);
                opacity:0;
            }
            to{
                transform:translateY(0);
                opacity:1;
            }
        }


        .titulo{
            color:#d63384;
            font-weight:bold;
        }

        .icono{
            font-size:90px;
            animation: pop 0.6s ease;
        }

        @keyframes pop{
            0%{transform:scale(0.5)}
            80%{transform:scale(1.1)}
            100%{transform:scale(1)}
        }


        .btn-primary{
            background:#ff69b4;
            border:none;
            border-radius:30px;
            padding:12px;
            font-weight:600;
        }

        .btn-primary:hover{
            background:#ff4fa3;
        }

        .btn-outline-secondary{
            border-radius:30px;
            padding:10px;
        }

        .logo{
            color:#ff69b4;
            font-weight:bold;
            font-size:28px;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1 class="text-center mb-4 logo">🍰 Dulce Tentación</h1>

        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow-lg border-0 text-center">
                    <div class="card-body p-5">

                        <div class="icono mb-4">
                            ✅
                        </div>

                        <h2 class="mb-3 titulo">¡Pago aprobado!</h2>

                        <p class="text-muted">
                            Gracias por tu compra en <strong>Dulce Tentación</strong>.  
                            Tu pedido fue procesado correctamente y pronto estará listo.
                        </p>

                        <div class="d-grid gap-3 mt-4">

                            <a href="/inicio.html" class="btn btn-primary btn-lg">
                                Seguir comprando
                            </a>

                            <a href="/perfil" class="btn btn-outline-secondary">
                                Ver mi perfil
                            </a>

                        </div>

                    </div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
